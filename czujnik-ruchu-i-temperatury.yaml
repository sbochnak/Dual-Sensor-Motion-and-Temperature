# config to run on m5atom lite with two sensors:
# 1. motion sensor (based on microwave radar)
# 2. DHT11 60+ - temperature and humidity

# target location: garaż
# status: fully functional, deployed on site

# Important lesson learned: some input line filtering is obligatory (see links at the sensor section): 220 uF capacitor!

# Please note that references in this file to "lights" have nothing to do with the "big" lights or bulbs.
# ESP32 board only generates events that are received by Home Assistant and processed further (ie. triggers other actions).
# Lights in this file refer to the LEDs available on the M5 stack controller, and are used for diagnostic purposes informing:  
#  - power on - fast blue pulsing
#  - WiFi connected - green slow pulsing
#  - WiFi disconneted - red fast pulsing
#  - motion detected - one red pulse


esphome:
  name: czujnik-ruchu-i-temperatury
  friendly_name: Czujnik ruchu i temperatury
  
  platformio_options:
    upload_speed: 115200
    monitor_speed: 115200
    monitor_filters: 
      - colorize  

  on_boot:
    - priority: 600
      then:
        - light.turn_on: 
            id: dioda_rgb
            brightness: 100%
            red: 0%
            green: 0%
            blue: 100%
            effect: "Fast Pulse"
    - priority: -100
      then:
        - light.turn_off: dioda_rgb      


esp32:
  board: m5stack-atom
  framework:
    type: arduino

# Enable logging
logger:
  baud_rate: 115200
#  level: very_verbose # warn
#  logs:
#    api.service: error
#    remote_receiver.esp32: very_verbose
#    remote_transmitter.esp32: verbose

# Enable Home Assistant API
api:
  encryption:
    key: "LxchxPde6kzYzm9Y1TGVpxrKNQvcPDC08pmvWuUUeug="

ota:
  - platform: esphome
    password: "8980243118fd59abaff3a64cad825028"


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "czujnik-ruchu-i-temperatury"
    password: "pqUnVVryqGYe"

  passive_scan: True

  on_connect:
    then:
      - light.turn_on: 
          id: dioda_rgb
          brightness: 100%
          red: 0%
          green: 100%
          blue: 0%
          effect: "Slow Pulse"
      - delay: 0.2s
      - light.turn_off: dioda_rgb

  on_disconnect:
    then:
      - light.turn_on: 
          id: dioda_rgb
          brightness: 100%
          red: 100%
          green: 0%
          blue: 0%
          effect: "Fast Pulse"



captive_portal:
    

##################

# Enable RGBW (SK6812mini) LED diode to be used in automations    
light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    rmt_channel: 6 #4 channels are used by receiver, 1 channel by transmitter, of total 8
    chipset: sk6812
    name: "Dioda RGBW LED"
    id: dioda_rgb
    num_leds: 1
    pin: GPIO27
    default_transition_length: 0.2s
    entity_category: config
    effects:
      - pulse:
          name: "Fast Pulse"
          transition_length: 0s
          update_interval: 0.1s
          min_brightness: 0%
          max_brightness: 100%
      - pulse:
          name: "Slow Pulse"
          transition_length: 0.2s
          update_interval: 0.4s
          min_brightness: 0%
          max_brightness: 100%   


# temp and humidity configuration entry
sensor:
  - platform: dht
    pin: 
      number: GPIO23
    model: DHT11
    temperature:
      name: "Temperatura"
    humidity:
      name: "Wilgotność"
    update_interval: 10s


# Doppler Radar Sensor Module - RCWL-0516 (with Headers)
# https://www.sparkfun.com/products/21242
# Output Voltage: 3.3V
# Operating Voltage: 4-28V
# Transmission Power: 20mW (typical), 30mW (max)
# Maximum Current: ~2.7 mA
# Detection Distance: 5-7 meters
# Operating Frequency: ~3.18 GHz
# Signal Length: ~2s

# RCWL-0516

# resistors / pullup specs 
# https://community.home-assistant.io/t/custom-sensor-using-nodemcu-and-rcwl-0516-solved/313635/13
# https://www.letscontrolit.com/wiki/index.php/RCWL-0516_Microwave_Motion_Sensor
# The sensor work correctly at the beginning, then started generating false detections every couple of seconds.
# Adding a 220uF capacitory to VIN and GND had solved the problem. 

binary_sensor:
  - platform: gpio
    name: "Ruch (Dopplera)"
    pin:
      number: GPIO22
      inverted: false
      mode: INPUT_PULLUP
    on_press:
      then:
        - logger.log: "Motion detected!"
        - light.turn_on: 
            id: dioda_rgb
            brightness: 100%
            red: 100%
            green: 0%
            blue: 0% 
        - delay: 0.1s
        - light.turn_off: dioda_rgb
    

